<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contour Canvas Isolation</title>
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/main.css" />
  <style>
    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      display: grid;
      place-items: center;
      min-height: 100vh;
      background: #f4f0e8;
    }

    .squiggle {
      position: relative;
      width: 120px;
      height: 120px;
      overflow: visible;
      padding-left: 20px;
      padding-top: 20px;
    }

    .squiggle a {
      display: block;
      width: 100%;
      height: 100%;
      position: relative;
      overflow: visible;
    }

    .squiggle canvas {
      display: block;
      position: absolute;
      pointer-events: none;
      outline: 1px solid rgba(46, 44, 44, 0.12);
    }
  </style>
</head>
<body>
  <div class="squiggle">
    <!-- <a href="#" aria-label="Contour isolation canvas"> -->
      <canvas aria-hidden="true" id="squiggle"></canvas>
    <!-- </a> -->
  </div>
  <script src="{{ site.baseurl }}/assets/js/main.js"></script>
</body>
</html>
