---
layout: default
---

<header class="post-hero post-hero--photographs">
  <div class="post-hero__container">
    <h1>{{page.title}}</h1>
  </div>
</header>

<div class="content content--photographs">
{%- include content.html -%}
</div>

<a class="photographs-back-to-top" href="#">
  <span aria-hidden="true">&uarr;</span>
  <span class="sr-only">Back to top</span>
</a>

<script>
  document.querySelectorAll("img").forEach((img, i) => {
    img.setAttribute("decoding", "async");
    if (i > 1) img.setAttribute("loading", "lazy");
    else img.setAttribute("loading", "eager");
  });
</script>
